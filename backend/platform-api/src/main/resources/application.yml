spring:
  application:
    name: aicare-platform-api
  datasource:
    url: ${AICARE_DB_URL:jdbc:mysql://localhost:3306/aicare_desk?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AICARE_DB_USER:aicare}
    password: ${AICARE_DB_PASSWORD:aicare_dev_password}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${PLATFORM_API_PORT:8080}

aicare:
  version: ${AICARE_PLATFORM_VERSION:0.1.0-SNAPSHOT}
