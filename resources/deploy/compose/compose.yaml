name: aicare-desk

services:
  mysql:
    image: ${DOCKER_IMAGE_PREFIX:-}mysql:8.4
    profiles: ["core"]
    container_name: aicare-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aicare_desk}
      MYSQL_USER: ${MYSQL_USER:-aicare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aicare_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aicare_root_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: ${DOCKER_IMAGE_PREFIX:-}redis:7.4
    profiles: ["core"]
    container_name: aicare-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-aicare_redis_password}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-aicare_redis_password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
